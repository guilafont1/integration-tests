name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: python -m flake8 app

      - name: Security (bandit)
        run: python -m bandit -r app

      - name: Run tests + coverage.xml + JUnit XML
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-fail-under=80 --junitxml=report.xml

      - name: Upload reports (coverage.xml, report.xml)
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage.xml
            report.xml

